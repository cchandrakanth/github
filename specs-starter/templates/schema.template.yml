# {Feature Name} — Database Schema
# Defines database collections/tables, document/row shapes, indexes, and access rules

feature: "{feature-name}"
spec_ref: "specs/{feature-name}/spec.md"

collections:
  - path: "{collection_or_table_path}"
    description: "{What this collection/table stores}"
    document:
      fields:
        - name: "id"
          type: "string"
          required: true
          description: "Primary identifier"
        - name: "createdAt"
          type: "timestamp"
          required: true
          description: "Creation timestamp"
        - name: "updatedAt"
          type: "timestamp"
          required: true
          description: "Last update timestamp"

    indexes:
      - fields: ["{field1}", "{field2}"]
        order: [asc, desc]
        purpose: "{What query this index supports}"

    access_rules: |
      # Define access control rules for this collection/table

api_routes:
  - method: "GET"
    path: "/api/{resource}"
    reads_from: "{collection/table}"
    description: "{What this route returns}"
  - method: "POST"
    path: "/api/{resource}"
    writes_to: "{collection/table}"
    description: "{What this route creates/updates}"
